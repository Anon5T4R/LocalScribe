<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="512" rx="200" fill="url(#sheen)"/>

  <!-- waveform (áudio) -->
  <g fill="#ffffff" opacity="0.95">
    <rect x="200" y="428" width="52" height="168" rx="26"/>
    <rect x="292" y="356" width="52" height="312" rx="26"/>
    <rect x="384" y="272" width="52" height="480" rx="26"/>
    <rect x="476" y="380" width="52" height="264" rx="26"/>
    <rect x="568" y="308" width="52" height="408" rx="26"/>
    <rect x="660" y="404" width="52" height="216" rx="26"/>
    <rect x="752" y="460" width="52" height="104" rx="26"/>
  </g>

  <!-- linha de texto embaixo (transcrição) -->
  <g fill="#ffffff" opacity="0.55">
    <rect x="200" y="780" width="380" height="34" rx="17"/>
    <rect x="612" y="780" width="120" height="34" rx="17"/>
  </g>

  <!-- easter egg da marca -->
  <text x="800" y="880" font-family="Segoe Script, cursive" font-size="88"
        fill="#ffffff" opacity="0.5" text-anchor="middle">Taylor</text>
</svg>
